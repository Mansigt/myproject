<html>
    <head>
    <title>register</title>
 <style>
            body{
                background:linear-gradient(135deg,#1abc9c,#2c3e50);
                font-family: Arial,sans-serif;
                margin:0;
                display: flex;
                align-items: center;
                justify-content:center;
                min-height: 100vh;
            }
            .login-box{
                background: white;
                padding: 40px;
                width:300px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                text-align: center;
            }
            .login-box h2{
                margin-bottom: 20px;
            }
            .login-box input{
                width: 100%;
                padding: 10px;
                margin: 10px 0;
                border-radius: 6px;
                border: 1px solid #ccc;
            }
            .login-box button{
                width: 100%;
                padding: 10px;
                background: #1abc9c;
                color: white;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }
            .login-box button:hover{
                background: #16a085;
            }
            .links a{
                display: block;
                text-decoration: none;
                color: #3498db;
                margin: 5px 0;
            }
            .links a:hover{
                text-decoration: underline;
            }
        </style>   
</head>
    <body>
        <div class="login-box">
        <h2>Register</h2>
        {% if messages %}
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username"><br><br>
            <input type="email" name="email" placeholder="E-mail"><br><br>
            <input type="password" name="password" placeholder="Password"><br><br>
            <input type="text" name="phone" placeholder="Phone Number"><br><br>
            <input type="text" name="aadhar" placeholder="AADHAR/PAN"><br><br>
            <select name="house" required> 
                  <option value="">  Select House    </option>
                  {% for h in houses %}
                  <option value="{{ h.id }}"> {{ h.house_no }} </option>
                  {% endfor %}
            </select>
           <div class="links"><button type="submit">register</button></div>
        </form>
    </body>
</html>
