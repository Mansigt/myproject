<html>
    <head>
        <title>Verify 2FA</title>
        <style>
            body{
                background:linear-gradient(135deg,#1abc9c,#2c3e50);
                font-family: Arial,sans-serif;
                margin:0;
                display: flex;
                align-items: center;
                justify-content:center;
                min-height: 100vh;
            }
            .login-box{
                background: white;
                padding: 40px;
                width:300px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                text-align: center;
            }
            .login-box h2{
                margin-bottom: 20px;
            }
            .login-box input{
                width: 100%;
                padding: 10px;
                margin: 10px 0;
                border-radius: 6px;
                border: 1px solid #ccc;
            }
            .login-box button{
                width: 100%;
                padding: 10px;
                background: #1abc9c;
                color: white;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }
            .login-box button:hover{
                background: #16a085;
            }
            .links a{
                display: block;
                text-decoration: none;
                color: #3498db;
                margin: 5px 0;
            }
            .links a:hover{
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="login-box">
        <h2>Enter OTP</h2>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="otp" placeholder="Enter OTP">
            <button type="submit">Verify</button>
        </form>
        {% if error %}
          <p style="color: red;">{{ error }}</p>
        {% endif %}
        </div>
    </body>
</html>
