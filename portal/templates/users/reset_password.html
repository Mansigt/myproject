html>
    <head>
        <title>Reset password</title>
       <style>
            body{
                background:linear-gradient(135deg,#1abc9c,#2c3e50);
                font-family: Arial,sans-serif;
                margin:0;
                display: flex;
                align-items: center;
                justify-content:center;
                min-height: 100vh;
            }
            .reset-box{
                background: white;
                padding: 40px;
                width:300px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                text-align: center;
            }
            .reset-box h2{
                margin-bottom: 20px;
            }
            .reset-box input{
                width: 100%;
                padding: 10px;
                margin: 10px 0;
                border-radius: 6px;
                border: 1px solid #ccc;
            }
            .reset-box button{
                width: 100%;
                padding: 10px;
                background: #1abc9c;
                color: white;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }
            .reset-box button:hover{
                background: #16a085;
            }
            .links a{
                display: block;
                text-decoration: none;
                color: #3498db;
                margin: 5px 0;
            }
            .links a:hover{
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <div class="reset-box">
        <h2 style="color:navy;">Reset password</h2>
        <form method="post">
            {% csrf_token %}
            <input type="password" name="password" placeholder="Enter password" required><br><br>
            <button type="submit">Reset Password</button>
        </form>
        {% if messages %}
            {% for message in messages %}
                  <p style="color: red;">{{ message }}</p>
            {% endfor %} 
        {% endif %}  
        </div>
    </body>
</html>
